      - paragraph [ref=f3e18]: Оператором персональных данных является сервис Shaqyrtu (далее — «Оператор»).
    - generic [ref=f3e19]:
      - heading "2. Состав обрабатываемых данных" [level=2] [ref=f3e20]
      - paragraph [ref=f3e21]: "Оператор обрабатывает следующие категории персональных данных Субъекта: номер телефона; содержание карточки приглашения (имена, даты мероприятия, текст и загруженные медиафайлы); идентификаторы сессии и технические сведения об устройстве (IP-адрес, тип браузера); сведения о платёжных операциях (без хранения реквизитов платёжных инструментов)."
    - generic [ref=f3e22]:
      - heading "3. Цели обработки персональных данных" [level=2] [ref=f3e23]
      - paragraph [ref=f3e24]: "Персональные данные Субъекта обрабатываются в целях: идентификации Субъекта и привязки карточки приглашения к его номеру телефона; доставки системных уведомлений, ссылок для управления приглашением и сведений об операциях; исполнения платёжных обязательств и соблюдения налогового законодательства; технического обеспечения и поддержки сервиса; соблюдения требований законодательства Республики Казахстан."
    - generic [ref=f3e25]:
