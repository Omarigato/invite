      - paragraph [ref=f3e27]: Правовым основанием обработки персональных данных является согласие Субъекта данных, предоставленное в соответствии с п. 1 ч. 2 ст. 9 Закона Республики Казахстан «О персональных данных и их защите» № 94-V от 21 мая 2013 года.
    - generic [ref=f3e28]:
      - heading "5. Сроки хранения персональных данных" [level=2] [ref=f3e29]
      - paragraph [ref=f3e30]: Карточки приглашения и черновики, созданные без подтверждённой оплаты, не гарантируют постоянного хранения и могут быть удалены Оператором в любое время без предварительного уведомления Субъекта. Карточки приглашения с подтверждённой оплатой хранятся не дольше 6 (шести) месяцев с даты последней платёжной операции. По истечении указанного срока карточки могут быть безвозвратно удалены или переведены в архив.
    - generic [ref=f3e31]:
      - heading "6. Передача персональных данных третьим лицам" [level=2] [ref=f3e32]
      - paragraph [ref=f3e33]: "Передача персональных данных Субъекта третьим лицам допускается исключительно в следующих случаях: процессинговым организациям — для проведения платёжных операций; провайдерам услуг связи (Telegram и иным) — для доставки уведомлений и ссылок; уполномоченным государственным органам Республики Казахстан — по основаниям, предусмотренным законодательством. Продажа или передача персональных данных третьим лицам в коммерческих целях не осуществляется."
    - generic [ref=f3e34]:
      - heading "7. Права субъекта персональных данных" [level=2] [ref=f3e35]
      - paragraph [ref=f3e36]: "В соответствии с действующим законодательством Субъект вправе: получать информацию об условиях обработки своих персональных данных; требовать уточнения, исправления, блокировки или уничтожения своих персональных данных; Отзыв согласия может повлечь прекращение доступа Субъекта к функциям сервиса."
    - generic [ref=f3e37]:
      - heading "8. Подтверждение субъекта" [level=2] [ref=f3e38]
      - paragraph [ref=f3e39]: "Подтверждая настоящее Соглашение, Субъект персональных данных удостоверяет: действует осознанно и добровольно, без принуждения; является дееспособным лицом; ознакомлен с условиями Соглашения и своими правами в полном объёме; понимает, что номер телефона признаётся персональными данными в соответствии с Законом РК № 94-V; не возражает против трансграничной передачи данных в пределах, установленных настоящим Соглашением."
    - paragraph [ref=f3e41]: "Настоящее согласие считается данным с момента нажатия кнопки «Сохранить». Последнее обновление документа: 15 мая 2026 г."